# Server
server.port=${PORT:8080}

# Spring Datasource (set these in Render for production)
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:h2:mem:tribalcraft;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Static Resources
spring.web.resources.static-locations=file:../frontend/,classpath:/static/
spring.mvc.static-path-pattern=/**

# App Properties
app.jwt.secret=${APP_JWT_SECRET:${JWT_SECRET:tribalcraft-dev-secret-change-this-to-a-long-random-value}}
app.jwt.expiration-ms=86400000

# Recaptcha
app.recaptcha.enabled=${APP_RECAPTCHA_ENABLED:${RECAPTCHA_ENABLED:true}}
app.recaptcha.site-key=${APP_RECAPTCHA_SITE_KEY:${RECAPTCHA_SITE_KEY:6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI}}
app.recaptcha.secret-key=${APP_RECAPTCHA_SECRET_KEY:${RECAPTCHA_SECRET_KEY:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe}}

# Supabase
app.supabase.url=${APP_SUPABASE_URL:${SUPABASE_URL:}}
app.supabase.service-role-key=${APP_SUPABASE_SERVICE_ROLE_KEY:${SUPABASE_SERVICE_ROLE_KEY:}}
app.supabase.bucket-name=${APP_SUPABASE_BUCKET_NAME:${SUPABASE_BUCKET_NAME:}}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500}}
